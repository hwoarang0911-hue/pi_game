<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>π Memory</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<!-- Firebase SDK (cloud leaderboard) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<style>
  :root {
    --bg:#0a0a0f; --panel:#0f0f1a; --border:#1a1a2e;
    --accent:#00ff88; --accent2:#00ccff;
    --danger:#ff3366; --hc:#ff6600;
    --text:#e0e0ff; --dim:#4a4a6a;
    --glow:0 0 10px var(--accent),0 0 20px rgba(0,255,136,0.3);
  }

  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}

  body{
    background:var(--bg);color:var(--text);
    font-family:'Share Tech Mono',monospace;
    min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden;
  }

  body::after{
    content:'';position:fixed;inset:0;
    background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.15) 2px,rgba(0,0,0,0.15) 4px);
    pointer-events:none;z-index:9999;
  }

  .screen{width:100%;max-width:390px;height:100svh;max-height:844px;display:flex;flex-direction:column;overflow:hidden;}
  .view{display:none;flex-direction:column;height:100%;}
  .view.active{display:flex;}

  /* ===== START ===== */
  #startScreen{
    align-items:center;justify-content:center;
    background:radial-gradient(ellipse at 50% 40%,#0f1a2e 0%,#0a0a0f 70%);
  }

  .pi-hero{position:relative;margin-bottom:8px;}

  .pi-symbol{
    font-family:'Orbitron',monospace;font-size:160px;font-weight:900;line-height:1;
    background:linear-gradient(135deg,var(--accent) 0%,var(--accent2) 50%,#aa00ff 100%);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
    filter:drop-shadow(0 0 30px rgba(0,255,136,0.5)) drop-shadow(0 0 60px rgba(0,204,255,0.3));
    animation:piFloat 3s ease-in-out infinite;
  }

  @keyframes piFloat{0%,100%{transform:translateY(0);}50%{transform:translateY(-12px);}}

  .pi-symbol.rainbow{
    animation:piFloat 3s ease-in-out infinite,piRainbow 0.6s linear infinite;
    background:linear-gradient(135deg,#ff0000,#ff8800,#ffff00,#00ff88,#00ccff,#aa00ff,#ff0088,#ff0000);
    background-size:400% 400%;
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
    filter:drop-shadow(0 0 40px rgba(255,100,100,0.9)) drop-shadow(0 0 80px rgba(100,255,200,0.7));
  }

  @keyframes piRainbow{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
  }

  /* Easter egg credit */
  .credit-overlay{
    position:fixed;inset:0;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    pointer-events:none;z-index:9000;
    gap:12px;
  }

  .credit-line{
    font-family:'Orbitron',monospace;font-size:14px;font-weight:700;letter-spacing:4px;
    background:linear-gradient(135deg,#ff0000,#ff8800,#ffff00,#00ff88,#00ccff,#aa00ff,#ff0088);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
    opacity:0;
  }

  .credit-line.rise{
    animation:creditRise 0.6s ease-out forwards;
  }

  .credit-overlay.fade-out{
    animation:creditFadeOut 0.4s ease-out forwards;
  }

  @keyframes creditRise{
    0%  { opacity:0; transform:translateY(40px); }
    100%{ opacity:1; transform:translateY(0); }
  }

  @keyframes creditFadeOut{
    0%  { opacity:1; }
    100%{ opacity:0; }
  }

  .pi-rings{position:absolute;inset:-20px;pointer-events:none;}
  .pi-ring{position:absolute;inset:0;border-radius:50%;border:1px solid;animation:ringPulse 2s ease-in-out infinite;}
  .pi-ring:nth-child(1){border-color:rgba(0,255,136,0.3);}
  .pi-ring:nth-child(2){inset:-15px;border-color:rgba(0,204,255,0.2);animation-delay:0.5s;}
  .pi-ring:nth-child(3){inset:-30px;border-color:rgba(170,0,255,0.1);animation-delay:1s;}

  @keyframes ringPulse{0%,100%{opacity:0.3;transform:scale(1);}50%{opacity:1;transform:scale(1.05);}}

  .game-title{font-family:'Orbitron',monospace;font-size:11px;letter-spacing:6px;color:var(--dim);margin-bottom:28px;}
  .pi-preview{font-size:11px;color:var(--dim);letter-spacing:2px;margin-bottom:28px;opacity:0.6;}

  /* Mode selector */
  .mode-selector{display:flex;border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:16px;width:280px;}
  .mode-btn{
    flex:1;padding:12px 0;background:transparent;border:none;
    font-family:'Orbitron',monospace;font-size:9px;letter-spacing:2px;
    cursor:pointer;color:var(--dim);transition:all 0.2s;
  }
  .mode-btn .mi{display:block;font-size:18px;margin-bottom:4px;}
  .mode-divider{width:1px;background:var(--border);}
  .mode-btn.sel-ta{background:rgba(0,255,136,0.1);color:var(--accent);}
  .mode-btn.sel-mem{background:rgba(255,102,0,0.15);color:var(--hc);}

  /* Target selector (time attack only) */
  .target-selector{
    display:flex;gap:8px;margin-bottom:20px;width:280px;
    opacity:0;pointer-events:none;transition:opacity 0.2s;
    height:40px;
  }
  .target-selector.visible{opacity:1;pointer-events:all;}

  .target-btn{
    flex:1;padding:0;background:transparent;
    border:1px solid var(--border);border-radius:6px;
    font-family:'Orbitron',monospace;font-size:11px;font-weight:700;
    color:var(--dim);cursor:pointer;transition:all 0.2s;
    letter-spacing:1px;
  }

  .target-btn.sel{background:rgba(0,255,136,0.12);border-color:var(--accent);color:var(--accent);}

  .btn-start{
    width:280px;padding:14px 0;background:transparent;
    border:2px solid var(--accent);color:var(--accent);
    font-family:'Orbitron',monospace;font-size:14px;font-weight:700;
    letter-spacing:3px;cursor:pointer;box-shadow:var(--glow);margin-bottom:12px;transition:all 0.15s;
  }
  .btn-start:active{background:var(--accent);color:var(--bg);}
  .btn-start.mem{border-color:var(--hc);color:var(--hc);box-shadow:0 0 10px var(--hc),0 0 20px rgba(255,102,0,0.3);}
  .btn-start.mem:active{background:var(--hc);color:var(--bg);}
  .btn-start:disabled{opacity:0.35;pointer-events:none;}

  .btn-lb{
    width:280px;padding:10px 0;background:transparent;
    border:1px solid var(--dim);color:var(--dim);
    font-family:'Orbitron',monospace;font-size:11px;letter-spacing:3px;cursor:pointer;
  }

  /* ===== GAME ===== */
  #gameScreen{background:var(--bg);}
  #gameScreen.mem{background:#0f0800;}

  .game-header{
    display:flex;align-items:center;justify-content:space-between;
    padding:10px 16px;border-bottom:1px solid var(--border);
    background:var(--panel);flex-shrink:0;
  }

  #gameScreen.mem .game-header{background:#120900;border-color:#2a1800;}

  .lives{display:flex;gap:6px;font-size:16px;}
  .life{transition:all 0.3s;}
  .life.lost{opacity:0.15;filter:grayscale(1);}

  .mode-badge{
    font-family:'Orbitron',monospace;font-size:7px;letter-spacing:2px;
    padding:2px 5px;margin-top:4px;
  }

  .mode-badge.ta{color:var(--accent);border:1px solid var(--accent);}
  .mode-badge.mem{color:var(--hc);border:1px solid var(--hc);}

  .timer{
    font-family:'Orbitron',monospace;font-size:20px;font-weight:700;
    color:var(--accent);text-shadow:var(--glow);letter-spacing:2px;
  }

  #gameScreen.mem .timer{color:var(--hc);text-shadow:0 0 10px var(--hc);}

  /* Progress bar for time attack */
  .progress-wrap{
    position:relative;height:3px;background:var(--border);flex-shrink:0;
    display:none;
  }
  .progress-wrap.visible{display:block;}
  .progress-bar{height:100%;background:var(--accent);transition:width 0.1s linear;width:0%;}
  #gameScreen.mem .progress-bar{background:var(--hc);}

  .dcount{font-family:'Orbitron',monospace;font-size:11px;color:var(--accent);}
  #gameScreen.mem .dcount{color:var(--hc);}

  /* Pi display */
  .pi-display{flex:1;overflow-y:auto;padding:10px 8px;scrollbar-width:none;}
  .pi-display::-webkit-scrollbar{display:none;}
  .digit-rows{display:flex;flex-direction:column;gap:3px;}

  .digit-row{display:flex;align-items:center;gap:0;}
  .dg{display:flex;gap:2px;}
  .dgap{width:8px;flex-shrink:0;}

  .dc{
    width:28px;height:32px;
    display:flex;align-items:center;justify-content:center;
    font-size:17px;border-radius:3px;flex-shrink:0;
  }

  .dc.fixed{color:var(--dim);}
  .dc.correct{color:var(--accent);background:rgba(0,255,136,0.08);}
  .dc.curr{
    color:var(--accent2);background:rgba(0,204,255,0.15);
    box-shadow:0 0 8px rgba(0,204,255,0.4);
    animation:blink 0.8s ease-in-out infinite;
  }
  .dc.future{color:#252535;}
  .dc.target-mark{outline:2px solid rgba(0,255,136,0.4);outline-offset:-2px;}

  /* memory mode overrides */
  .mem-mode .dc.correct{color:var(--hc);background:rgba(255,102,0,0.07);}
  .mem-mode .dc.curr{
    color:#ffcc00;background:rgba(255,204,0,0.12);
    box-shadow:0 0 8px rgba(255,204,0,0.3);
    animation:blink 0.8s ease-in-out infinite;
  }
  .mem-mode .dc.future{color:transparent;background:#111118;border:1px solid #18181f;}

  @keyframes blink{0%,100%{opacity:1;}50%{opacity:0.3;}}

  .row-lap{width:44px;text-align:right;font-size:10px;color:var(--accent2);flex-shrink:0;padding-left:4px;}
  #gameScreen.mem .row-lap{color:var(--hc);}
  .row-lap.pend{color:#1a1a2e;}

  /* ===== KEYPAD ===== */
  .keypad{padding:8px 12px 16px;background:var(--panel);border-top:1px solid var(--border);flex-shrink:0;}
  #gameScreen.mem .keypad{background:#120900;border-color:#2a1800;}

  .krow{display:flex;gap:8px;margin-bottom:8px;justify-content:center;}

  .key{
    flex:1;height:64px;
    background:#13131f;border:1px solid #222236;border-bottom:3px solid #0a0a14;
    border-radius:8px;font-family:'Orbitron',monospace;font-size:22px;font-weight:700;
    color:var(--text);cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    user-select:none;-webkit-user-select:none;
    transition:border-bottom-width 0.08s,transform 0.08s,background 0.08s;
  }
  #gameScreen.mem .key{background:#1a1000;border-color:#2a1800;border-bottom-color:#0a0800;color:var(--hc);}
  .key:active{border-bottom-width:1px;transform:translateY(2px);background:#1a1a2e;}
  #gameScreen.mem .key:active{background:#2a1800;}
  .key.k0{max-width:calc(33.33% - 6px);}
  .keypad.locked .key{opacity:0.3;pointer-events:none;}

  @keyframes shake{
    0%,100%{transform:translateX(0);}
    15%{transform:translateX(-9px);}
    35%{transform:translateX(9px);}
    55%{transform:translateX(-5px);}
    75%{transform:translateX(5px);}
  }
  .shaking{animation:shake 0.4s ease-out;}

  /* Finish popup - blocks interaction for 2s */
  .finish-popup{
    position:fixed;inset:0;
    display:flex;align-items:center;justify-content:center;
    background:rgba(0,0,0,0.85);
    z-index:8000;pointer-events:all;
  }

  .finish-word{
    font-family:'Orbitron',monospace;font-size:48px;font-weight:900;letter-spacing:8px;
    animation:finBlink 0.6s step-end infinite;
  }

  .finish-word.success{color:var(--accent);text-shadow:var(--glow);}
  .finish-word.fail{color:var(--danger);text-shadow:0 0 20px rgba(255,51,102,0.6);}
  .finish-word.over{color:var(--hc);text-shadow:0 0 20px rgba(255,102,0,0.6);}

  @keyframes finBlink{0%,100%{opacity:1;}50%{opacity:0.2;}}

  /* Clear flash on success - keep for flash effect */
  .clear-flash{
    position:fixed;inset:0;
    background:rgba(0,255,136,0.12);
    pointer-events:none;z-index:500;
    animation:clearAnim 0.4s ease-out forwards;
  }
  @keyframes clearAnim{0%{opacity:1;}100%{opacity:0;}}

  /* ===== RESULT ===== */
  #resultScreen{
    flex-direction:column;justify-content:flex-start;
    background:radial-gradient(ellipse at 50% 30%,#1a0a1a 0%,#0a0a0f 60%);
  }
  #resultScreen.mem{background:radial-gradient(ellipse at 50% 30%,#1a0800 0%,#080400 60%);}
  #resultScreen.ta-clear{background:radial-gradient(ellipse at 50% 30%,#001a10 0%,#0a0a0f 60%);}

  .res-body{
    flex:1;display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    padding:24px 24px 16px;gap:0;overflow-y:auto;
  }

  .res-title{
    font-family:'Orbitron',monospace;font-size:28px;font-weight:900;
    color:var(--danger);letter-spacing:4px;
    text-shadow:0 0 20px rgba(255,51,102,0.5);margin-bottom:4px;
  }
  .res-title.clear{color:var(--accent);text-shadow:var(--glow);}

  .res-badge{font-family:'Orbitron',monospace;font-size:9px;letter-spacing:3px;color:var(--dim);margin-bottom:20px;}
  .res-badge.mem{color:var(--hc);}
  .res-badge.ta{color:var(--accent);}

  .res-score{
    font-family:'Orbitron',monospace;font-size:64px;font-weight:900;
    color:var(--accent);text-shadow:var(--glow);line-height:1;margin-bottom:4px;
  }
  .res-score.mem{color:var(--hc);text-shadow:0 0 20px rgba(255,102,0,0.5);}

  .res-label{font-size:11px;color:var(--dim);letter-spacing:3px;margin-bottom:20px;}

  .res-stats{width:100%;border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:20px;}
  .stat-row{display:flex;justify-content:space-between;align-items:center;padding:10px 16px;border-bottom:1px solid var(--border);}
  .stat-row:last-child{border-bottom:none;}
  .slbl{font-size:11px;color:var(--dim);}
  .sval{font-family:'Orbitron',monospace;font-size:13px;color:var(--text);}

  .btn-res{
    width:100%;padding:13px;font-family:'Orbitron',monospace;
    font-size:13px;letter-spacing:3px;cursor:pointer;background:transparent;
  }
  .btn-res.pri{border:2px solid var(--accent);color:var(--accent);box-shadow:var(--glow);}
  .btn-res.pri.mem{border-color:var(--hc);color:var(--hc);box-shadow:0 0 10px var(--hc);}
  .btn-res:active{opacity:0.6;}

  /* Result footer - name input pinned to bottom */
  .res-footer{
    flex-shrink:0;
    padding:14px 20px 24px;
    border-top:1px solid var(--border);
    background:var(--panel);
  }

  .res-input-label{
    font-family:'Orbitron',monospace;font-size:9px;letter-spacing:3px;
    color:var(--dim);text-align:center;margin-bottom:10px;
  }

  .res-input-row{
    display:flex;gap:8px;margin-bottom:10px;
  }

  .res-name-input{
    flex:1;background:var(--bg);border:1px solid var(--border);
    border-radius:8px;color:var(--text);font-family:'Share Tech Mono',monospace;
    font-size:18px;padding:12px 14px;letter-spacing:3px;outline:none;
    min-width:0;
  }
  .res-name-input:focus{border-color:var(--accent);}
  #resultScreen.mem .res-name-input:focus{border-color:var(--hc);}

  .res-enter-btn{
    background:var(--accent);border:none;border-radius:8px;
    color:var(--bg);font-family:'Orbitron',monospace;font-size:11px;
    font-weight:700;letter-spacing:2px;padding:0 16px;cursor:pointer;
    flex-shrink:0;transition:opacity 0.15s;
  }
  #resultScreen.mem .res-enter-btn{background:var(--hc);}
  .res-enter-btn:active{opacity:0.7;}

  .res-skip-btn{
    width:100%;padding:10px;background:transparent;
    border:1px solid var(--accent);border-radius:8px;
    color:var(--accent);font-family:'Orbitron',monospace;
    font-size:10px;letter-spacing:2px;cursor:pointer;
    transition:all 0.15s;
    box-shadow:0 0 8px rgba(0,255,136,0.15);
  }
  .res-skip-btn:active{background:rgba(0,255,136,0.1);opacity:0.8;}
  #resultScreen.mem .res-skip-btn{border-color:var(--hc);color:var(--hc);box-shadow:0 0 8px rgba(255,102,0,0.15);}
  #resultScreen.mem .res-skip-btn:active{background:rgba(255,102,0,0.1);}

  /* ===== LEADERBOARD ===== */
  #lbScreen{background:var(--bg);}
  .lb-header{padding:14px 16px;border-bottom:1px solid var(--border);background:var(--panel);flex-shrink:0;}
  .lb-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
  .lb-title{font-family:'Orbitron',monospace;font-size:13px;color:var(--accent);letter-spacing:3px;}
  .lb-back{background:none;border:1px solid var(--border);color:var(--dim);font-family:'Share Tech Mono',monospace;font-size:12px;padding:6px 12px;cursor:pointer;}
  .lb-home{
    background:var(--accent);border:none;color:var(--bg);
    font-family:'Orbitron',monospace;font-size:10px;font-weight:700;
    letter-spacing:2px;padding:6px 14px;cursor:pointer;border-radius:3px;
    box-shadow:var(--glow);
  }
  .lb-home:active{opacity:0.7;}

  .lb-actions{display:flex;align-items:center;gap:8px;}

  .lb-cloud{
    font-family:'Orbitron',monospace;font-size:8px;letter-spacing:1px;
    color:var(--dim);padding:4px 8px;border:1px solid var(--border);border-radius:4px;
  }
  .lb-cloud.on{color:var(--accent);border-color:rgba(0,255,136,0.3);}

  .lb-refresh{
    background:none;border:1px solid var(--border);color:var(--dim);
    font-size:14px;padding:4px 8px;cursor:pointer;border-radius:4px;
    transition:all 0.15s;
  }
  .lb-refresh:active{border-color:var(--accent);color:var(--accent);}
  .lb-refresh.spinning{animation:spin 0.8s linear infinite;}
  @keyframes spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}};

  .lb-tabs{display:flex;border:1px solid var(--border);border-radius:6px;overflow:hidden;}
  .lb-tab{flex:1;padding:8px 0;background:transparent;border:none;font-family:'Orbitron',monospace;font-size:9px;letter-spacing:1px;cursor:pointer;color:var(--dim);transition:all 0.2s;}
  .lb-tab.on{background:rgba(0,255,136,0.1);color:var(--accent);}
  .lb-tab.memt.on{background:rgba(255,102,0,0.1);color:var(--hc);}

  /* Sub-tabs for time attack targets */
  .lb-subtabs{display:flex;gap:6px;margin-top:8px;}
  .lb-subtab{
    flex:1;padding:5px 0;background:transparent;border:1px solid var(--border);
    border-radius:4px;font-family:'Orbitron',monospace;font-size:9px;
    cursor:pointer;color:var(--dim);transition:all 0.2s;
  }
  .lb-subtab.on{background:rgba(0,255,136,0.1);border-color:var(--accent);color:var(--accent);}
  .lb-subtabs.hidden{display:none;}

  .lb-body{flex:1;overflow-y:auto;padding:10px 16px;scrollbar-width:none;}
  .lb-body::-webkit-scrollbar{display:none;}

  .lb-row{display:flex;align-items:center;gap:10px;padding:10px 12px;border-bottom:1px solid var(--border);}
  .lb-row.mine{background:rgba(0,255,136,0.05);border-left:2px solid var(--accent);}
  .lb-row.mine.mem-entry{background:rgba(255,102,0,0.05);border-left-color:var(--hc);}
  .lb-rk{font-family:'Orbitron',monospace;font-size:12px;color:var(--dim);width:24px;text-align:center;flex-shrink:0;}
  .lb-rk.g{color:#ffd700;} .lb-rk.s{color:#c0c0c0;} .lb-rk.b{color:#cd7f32;}
  .lb-nm{flex:1;font-size:13px;}
  .lb-sc{font-family:'Orbitron',monospace;font-size:14px;font-weight:700;color:var(--accent);}
  .lb-sc.mem{color:var(--hc);}
  .lb-tm{font-size:11px;color:var(--dim);text-align:right;flex-shrink:0;}
  .lb-empty{text-align:center;color:var(--dim);font-size:11px;padding:40px 0;letter-spacing:2px;}
  .lb-loading{text-align:center;color:var(--dim);font-size:11px;padding:40px 0;letter-spacing:2px;animation:pulse 1s ease-in-out infinite;}
  @keyframes pulse{0%,100%{opacity:0.4;}50%{opacity:1;}}

  /* ===== ADMIN ===== */
  .lb-admin-btn{
    display:block;width:100%;padding:8px;margin-top:12px;
    background:transparent;border:1px solid #1a1a2e;
    color:#2a2a4a;font-family:'Orbitron',monospace;font-size:8px;
    letter-spacing:2px;cursor:pointer;border-radius:4px;
    transition:all 0.2s;
  }
  .lb-admin-btn:hover{border-color:var(--dim);color:var(--dim);}

  .admin-overlay{
    position:fixed;inset:0;background:rgba(0,0,0,0.92);
    z-index:7000;display:flex;flex-direction:column;
    align-items:center;justify-content:flex-start;
    padding:24px 20px;overflow-y:auto;
  }
  .admin-title{

<script>
const PI = "14159265358979323846264338327950288419716939937510582097494459230781640628620899862803482534211706798214808651328230664709384460955058223172535940812848111745028410270193852110555964462294895493038196";

// =====================================================
// CLOUD LEADERBOARD SETUP
// 1. https://console.firebase.google.com 에서 프로젝트 생성
// 2. Firestore Database 활성화 (테스트 모드)
// 3. 아래 null을 Firebase 설정 객체로 교체
// =====================================================
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyDC9y70HDIbBITttojAHk1_0j3blb3lf08",
  authDomain: "pi-game-307e7.firebaseapp.com",
  projectId: "pi-game-307e7",
  storageBucket: "pi-game-307e7.firebasestorage.app",
  messagingSenderId: "1092954479536",
  appId: "1:1092954479536:web:868c0d38e888ce9e9d5475"
};

// 관리자 비밀번호 (변경 가능)
const ADMIN_PASSWORD = "pi3141592";

let db = null;

function initFirebase() {
  if (!FIREBASE_CONFIG) return;
  try {
    firebase.initializeApp(FIREBASE_CONFIG);
    db = firebase.firestore();
    const el = document.getElementById('cloudStatus');
    el.textContent = '☁ CLOUD';
    el.classList.add('on');
  } catch(e) { console.warn('Firebase init failed:', e); }
}

// =====================================================
// LOCAL STORAGE (fallback / offline cache)
// =====================================================
function lbKey(tab, sub) { return tab === 'ta' ? `pi_ta_${sub}` : 'pi_mem'; }
function getLbLocal(tab, sub) { try { return JSON.parse(localStorage.getItem(lbKey(tab,sub)) || '[]'); } catch(e) { return []; } }
function saveLbLocal(tab, sub, lb) { localStorage.setItem(lbKey(tab,sub), JSON.stringify(lb)); }

// =====================================================
// SCORE SUBMISSION
// =====================================================
async function addScoreTA(tgt, name, ms) {
  const entry = { name, ms, ts: Date.now() };
  // local
  const lb = getLbLocal('ta', tgt);
  lb.push(entry);
  lb.sort((a,b) => a.ms - b.ms);
  saveLbLocal('ta', tgt, lb.slice(0,100));
  // cloud
  if (db) {
    try { await db.collection(`lb_ta_${tgt}`).add(entry); } catch(e) { console.warn('Firestore write:', e); }
  }
}

async function addScoreMem(name, digits, ms) {
  const entry = { name, digits, ms, ts: Date.now() };
  // local
  const lb = getLbLocal('mem', null);
  lb.push(entry);
  lb.sort((a,b) => b.digits - a.digits || a.ms - b.ms);
  saveLbLocal('mem', null, lb.slice(0,100));
  // cloud
  if (db) {
    try { await db.collection('lb_mem').add(entry); } catch(e) { console.warn('Firestore write:', e); }
  }
}

// =====================================================
// LEADERBOARD RENDER
// =====================================================
let mode = 'ta';
let target = 30;
let lbTab = 'ta';
let lbSubtab = 30;
let G = {};
let pending = null;
let lastNickname = 'NICKNAME';

function selectMode(m) {
  mode = m;
  document.getElementById('btnTA').className = m==='ta' ? 'mode-btn sel-ta' : 'mode-btn';
  document.getElementById('btnMem').className = m==='mem' ? 'mode-btn sel-mem' : 'mode-btn';
  const b = document.getElementById('startBtn');
  b.className = m==='mem' ? 'btn-start mem' : 'btn-start';
  b.textContent = m==='mem' ? '💀 START' : 'START';
  const ts = document.getElementById('targetSel');
  ts.className = m==='ta' ? 'target-selector visible' : 'target-selector';
}

function selectTarget(t) {
  target = t;
  [30,50,100].forEach(v => {
    document.getElementById('t'+v).className = v===t ? 'target-btn sel' : 'target-btn';
  });
}

function switchTab(t) {
  lbTab = t;
  document.getElementById('tabTA').className = t==='ta' ? 'lb-tab on' : 'lb-tab';
  document.getElementById('tabMem').className = t==='mem' ? 'lb-tab memt on' : 'lb-tab memt';
  document.getElementById('lbSubtabs').className = t==='ta' ? 'lb-subtabs' : 'lb-subtabs hidden';
  renderLb();
}

function switchSubtab(v) {
  lbSubtab = v;
  [30,50,100].forEach(x => {
    document.getElementById('sub'+x).className = x===v ? 'lb-subtab on' : 'lb-subtab';
  });
  renderLb();
}

async function renderLb() {
  const isMem = lbTab === 'mem';
  const el = document.getElementById('lbBody');
  el.innerHTML = `<div class="lb-loading">LOADING...</div>`;

  let lb = [];
  if (db) {
    try {
      let snap;
      if (isMem) {
        // Firestore composite index needed: digits DESC, ms ASC
        // Firebase console will show a link to create it on first run
        snap = await db.collection('lb_mem')
          .orderBy('digits','desc').limit(100).get();
        lb = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        lb.sort((a,b) => b.digits - a.digits || a.ms - b.ms);
        lb = lb.slice(0, 30);
      } else {
        snap = await db.collection(`lb_ta_${lbSubtab}`)
          .orderBy('ms','asc').limit(30).get();
        lb = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      }
    } catch(e) {
      console.warn('Firestore read failed, using local:', e);
      lb = isMem ? getLbLocal('mem', null) : getLbLocal('ta', lbSubtab);
    }
  } else {
    lb = isMem ? getLbLocal('mem', null) : getLbLocal('ta', lbSubtab);
  }

  if (!lb.length) {
    el.innerHTML = `<div class="lb-empty">${isMem?'💀 ':''}NO RECORDS YET</div>
                    <button class="lb-admin-btn" onclick="openAdmin()">⚙ ADMIN</button>`;
    return;
  }

  const myName = lastNickname.toUpperCase();
  el.innerHTML = lb.slice(0,30).map((e,i) => {
    const rk = i===0?'🥇':i===1?'🥈':i===2?'🥉':`#${i+1}`;
    const rc = i===0?'g':i===1?'s':i===2?'b':'';
    const score = isMem ? e.digits : fmtT(e.ms);
    const sub   = isMem ? fmtT(e.ms) : '';
    const mine  = (e.name||'').toUpperCase() === myName;
    const mineClass = mine ? (isMem ? ' mine mem-entry' : ' mine') : '';
    const idAttr = e.id ? ` data-id="${e.id}"` : '';
    return `<div class="lb-row${mineClass}"${idAttr}>
      <div class="lb-rk ${rc}">${rk}</div>
      <div class="lb-nm">${e.name||'ANON'}</div>
      <div class="lb-sc ${isMem?'mem':''}">${score}</div>
      ${sub ? `<div class="lb-tm">${sub}</div>` : ''}
    </div>`;
  }).join('') + `<button class="lb-admin-btn" onclick="openAdmin()">⚙ ADMIN</button>`;
}

async function refreshLb() {
  const btn = document.getElementById('lbRefreshBtn');
  btn.classList.add('spinning');
  await renderLb();
  btn.classList.remove('spinning');
}

function showView(id) { document.querySelectorAll('.view').forEach(v=>v.classList.remove('active')); document.getElementById(id).classList.add('active'); }
function goHome() { showView('startScreen'); }
function showLb() { renderLb(); showView('lbScreen'); }

// =====================================================
// ADMIN PANEL
// =====================================================
let adminUnlocked = false;

function openAdmin() {
  const overlay = document.createElement('div');
  overlay.className = 'admin-overlay';
  overlay.id = 'adminOverlay';

  if (!adminUnlocked) {
    overlay.innerHTML = `
      <div class="admin-title">⚙ ADMIN</div>
      <div class="admin-pw-wrap">
        <input class="admin-pw-input" id="adminPwInput" type="password" placeholder="PASSWORD" maxlength="20">
        <button class="admin-pw-btn" onclick="checkAdminPw()">OK</button>
      </div>
      <div class="admin-pw-err" id="adminPwErr" style="display:none">WRONG PASSWORD</div>
      <button class="admin-close" onclick="closeAdmin()">← CLOSE</button>
    `;
    document.body.appendChild(overlay);
    document.getElementById('adminPwInput').addEventListener('keydown', e => { if(e.key==='Enter') checkAdminPw(); });
    document.getElementById('adminPwInput').focus();
  } else {
    document.body.appendChild(overlay);
    buildAdminPanel(overlay);
  }
}

function checkAdminPw() {
  const pw = document.getElementById('adminPwInput').value;
  if (pw === ADMIN_PASSWORD) {
    adminUnlocked = true;
    const overlay = document.getElementById('adminOverlay');
    overlay.innerHTML = '';
    buildAdminPanel(overlay);
  } else {
    document.getElementById('adminPwErr').style.display = 'block';
    document.getElementById('adminPwInput').value = '';
  }
}

function buildAdminPanel(overlay) {
  const isMem = lbTab === 'mem';
  const lb = isMem ? getLbLocal('mem', null) : getLbLocal('ta', lbSubtab);
  const tabLabel = isMem ? 'MEMORY' : `TIME ATTACK · ${lbSubtab}자리`;

  let rows = lb.slice(0,50).map((e,i) => {
    const score = isMem ? `${e.digits}자리` : fmtT(e.ms);
    return `<div class="admin-row">
      <div class="lb-rk" style="flex-shrink:0">#${i+1}</div>
      <div class="admin-row-nm">${e.name||'ANON'}</div>
      <div class="admin-row-sc ${isMem?'mem':''}">${score}</div>
      <button class="admin-del" onclick="adminDel(${i})">DEL</button>
    </div>`;
  }).join('');

  overlay.innerHTML = `
    <div class="admin-title">⚙ ADMIN</div>
    <div class="admin-section" style="width:100%;max-width:360px">
      <div class="admin-section-title">${tabLabel}</div>
      ${rows || '<div style="padding:16px;font-size:11px;color:var(--dim)">NO RECORDS</div>'}
    </div>
    <button class="admin-clear-btn" onclick="adminClearAll()">🗑 CLEAR ALL (${tabLabel})</button>
    <button class="admin-close" onclick="closeAdmin()">← CLOSE</button>
  `;
}

function adminDel(idx) {
  if (!confirm(`#${idx+1} 항목을 삭제할까요?`)) return;
  const isMem = lbTab === 'mem';
  const lb = isMem ? getLbLocal('mem', null) : getLbLocal('ta', lbSubtab);
  lb.splice(idx, 1);
  if (isMem) saveLbLocal('mem', null, lb);
  else saveLbLocal('ta', lbSubtab, lb);
  // Cloud delete: get id from rendered row (cloud entries have doc id)
  const overlay = document.getElementById('adminOverlay');
  buildAdminPanel(overlay);
  renderLb();
}

function adminClearAll() {
  const isMem = lbTab === 'mem';
  const tabLabel = isMem ? 'MEMORY' : `TIME ATTACK · ${lbSubtab}자리`;
  if (!confirm(`${tabLabel} 전체 기록을 삭제할까요?`)) return;
  if (isMem) saveLbLocal('mem', null, []);
  else saveLbLocal('ta', lbSubtab, []);
  const overlay = document.getElementById('adminOverlay');
  buildAdminPanel(overlay);
  renderLb();
}

function closeAdmin() {
  const overlay = document.getElementById('adminOverlay');
  if (overlay) overlay.remove();
}

// =====================================================
// AUDIO
// =====================================================
function lapAtRow(row) { return row === 0 ? 6 : 6 + row * 8; }
function rowOfPos(pos) { return pos < 6 ? 0 : 1 + Math.floor((pos - 6) / 8); }
function totalDisplayRows(pos) { return rowOfPos(pos) + 2; }

let _ac = null;
function getAC() { if(!_ac) _ac=new(window.AudioContext||window.webkitAudioContext)(); return _ac; }
const NOTES=[261.63,293.66,329.63,349.23,392.00,440.00,493.88,523.25,587.33,659.25];

function playTone(d){
  try{const c=getAC(),o=c.createOscillator(),g=c.createGain();
  o.type='square';o.frequency.value=NOTES[d];
  g.gain.setValueAtTime(0.07,c.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.12);
  o.connect(g);g.connect(c.destination);o.start();o.stop(c.currentTime+0.12);}catch(e){}
}

function playErr(){
  try{const c=getAC(),o=c.createOscillator(),g=c.createGain();
  o.type='sawtooth';
  o.frequency.setValueAtTime(110,c.currentTime);
  o.frequency.exponentialRampToValueAtTime(55,c.currentTime+0.35);
  g.gain.setValueAtTime(0.15,c.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.35);
  o.connect(g);g.connect(c.destination);o.start();o.stop(c.currentTime+0.35);}catch(e){}
}

function playLap(){
  try{const c=getAC();
  [523.25,659.25,783.99].forEach((f,i)=>{
    const o=c.createOscillator(),g=c.createGain(),t=c.currentTime+i*0.1;
    o.type='triangle';o.frequency.value=f;
    g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.08,t+0.02);
    g.gain.exponentialRampToValueAtTime(0.001,t+0.3);
    o.connect(g);g.connect(c.destination);o.start(t);o.stop(t+0.3);
  });}catch(e){}
}

function playClear(){
  try{const c=getAC();
  [523.25,659.25,783.99,1046.5].forEach((f,i)=>{
    const o=c.createOscillator(),g=c.createGain(),t=c.currentTime+i*0.12;
    o.type='triangle';o.frequency.value=f;
    g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.1,t+0.03);
    g.gain.exponentialRampToValueAtTime(0.001,t+0.5);
    o.connect(g);g.connect(c.destination);o.start(t);o.stop(t+0.5);
  });}catch(e){}
}

// =====================================================
// GAME LOGIC
// =====================================================
function renderRows() {
  const pos = G.pos;
  const isMem = G.mode === 'mem';
  const rows = totalDisplayRows(pos);
  const tgtPos = G.mode === 'ta' ? G.target - 1 : -1;
  let html = '';
  for (let row = 0; row < rows; row++) {
    const cells = [];
    for (let col = 0; col < 8; col++) cells.push(buildCell(row, col, pos, isMem, tgtPos));
    const lapBoundary = lapAtRow(row);
    const lapDone = pos >= lapBoundary;
    const lapTime = G.laps[row];
    const lapStr = lapDone && lapTime != null
      ? `<div class="row-lap">${fmtLap(lapTime)}</div>`
      : `<div class="row-lap pend">--</div>`;
    html += `<div class="digit-row">
      <div class="dg">${cells[0]}${cells[1]}${cells[2]}${cells[3]}</div>
      <div class="dgap"></div>
      <div class="dg">${cells[4]}${cells[5]}${cells[6]}${cells[7]}</div>
      ${lapStr}
    </div>`;
  }
  document.getElementById('drows').innerHTML = html;
  const dp = document.getElementById('piDisplay');
  dp.scrollTop = dp.scrollHeight;
  if (G.mode === 'ta') {
    const pct = Math.min(100, (pos / G.target) * 100);
    document.getElementById('progressBar').style.width = pct + '%';
  }
}

function buildCell(row, col, pos, isMem, tgtPos) {
  if (row===0 && col===0) return `<div class="dc fixed">3</div>`;
  if (row===0 && col===1) return `<div class="dc fixed">.</div>`;
  let pi = row===0 ? col-2 : 6+(row-1)*8+col;
  if (tgtPos >= 0 && pi > tgtPos) return `<div class="dc" style="visibility:hidden"></div>`;
  const digit = PI[pi] || '';
  const isTarget = tgtPos >= 0 && pi === tgtPos;
  const targetClass = isTarget ? ' target-mark' : '';
  let cls, txt;
  if (pi < pos) { cls = 'correct'; txt = digit; }
  else if (pi === pos) { cls = 'curr'; txt = isMem ? '_' : digit; }
  else { cls = 'future'; txt = isMem ? '' : digit; }
  return `<div class="dc ${cls}${targetClass}">${txt}</div>`;
}

function startGame() {
  dismissCredit();
  if (G.interval) clearInterval(G.interval);
  const isMem = mode === 'mem';
  G = { running:true, started:false, pos:0, lives:3, timerStart:0, elapsed:0,
        interval:null, laps:[], lapStart:0, locked:false, mode:mode,
        target:isMem ? Infinity : target, cleared:false };
  ['l0','l1','l2'].forEach(id=>document.getElementById(id).classList.remove('lost'));
  document.getElementById('timer').textContent = '00:00.0';
  document.getElementById('dcount').textContent = '0자리';
  document.getElementById('keypad').classList.remove('locked');
  const gs = document.getElementById('gameScreen');
  gs.className = isMem ? 'view mem' : 'view';
  document.getElementById('piDisplay').className = isMem ? 'pi-display mem-mode' : 'pi-display';
  const badge = document.getElementById('modeBadge');
  if (isMem) { badge.className='mode-badge mem'; badge.textContent='MEMORY'; }
  else { badge.className='mode-badge ta'; badge.textContent=`TARGET ${target}`; }
  const pw = document.getElementById('progressWrap');
  pw.className = isMem ? 'progress-wrap' : 'progress-wrap visible';
  document.getElementById('progressBar').style.width = '0%';
  renderRows();
  showView('gameScreen');
}

function pk(n, btn, evt) {
  if (evt) evt.preventDefault();
  if (!G.running || G.locked) return;
  if (!G.started) {
    G.started = true;
    G.timerStart = Date.now();
    G.lapStart = G.timerStart;
    G.interval = setInterval(()=>{ document.getElementById('timer').textContent = fmtT(Date.now()-G.timerStart); }, 100);
  }
  const correct = parseInt(PI[G.pos]);
  if (n === correct) {
    playTone(n);
    G.pos++;
    document.getElementById('dcount').textContent = `${G.pos}자리`;
    const completedRow = rowOfPos(G.pos-1);
    if (G.pos === lapAtRow(completedRow)) {
      const now = Date.now();
      G.laps[completedRow] = now - G.lapStart;
      G.lapStart = now;
      playLap();
    }
    if (G.mode === 'ta' && G.pos >= G.target) {
      G.running = false; G.cleared = true;
      clearInterval(G.interval);
      G.elapsed = Date.now() - G.timerStart;
      renderRows(); playClear(); showClearFlash();
      showFinishPopup('SUCCESS', 'success', function(){ showResult(); });
      return;
    }
    renderRows();
  } else {
    playErr(); G.lives--;
    const lost = 3-G.lives;
    document.getElementById('l2').classList.toggle('lost', lost>=1);
    document.getElementById('l1').classList.toggle('lost', lost>=2);
    document.getElementById('l0').classList.toggle('lost', lost>=3);
    shakePi();
    if (G.lives<=0) {
      G.running=false; clearInterval(G.interval);
      G.elapsed = G.started ? Date.now()-G.timerStart : 0;
      const word = G.mode==='mem' ? 'THE END' : 'FAILED';
      const cls  = G.mode==='mem' ? 'over' : 'fail';
      showFinishPopup(word, cls, function(){ showResult(); });
    } else {
      G.locked=true;
      document.getElementById('keypad').classList.add('locked');
      setTimeout(()=>{ if(G.running){G.locked=false;document.getElementById('keypad').classList.remove('locked');} },500);
    }
  }
}

function shakePi() {
  const el=document.getElementById('piDisplay');
  el.classList.remove('shaking'); void el.offsetWidth;
  el.classList.add('shaking');
  setTimeout(()=>el.classList.remove('shaking'),500);
}

function showClearFlash() {
  const el=document.createElement('div'); el.className='clear-flash';
  document.body.appendChild(el); setTimeout(()=>el.remove(),500);
}

function showFinishPopup(word, cls, onDone) {
  const popup = document.createElement('div'); popup.className = 'finish-popup';
  popup.innerHTML = `<div class="finish-word ${cls}">${word}</div>`;
  document.body.appendChild(popup);
  setTimeout(()=>{ popup.remove(); onDone(); }, 2000);
}

function showResult() {
  const isMem = G.mode==='mem';
  const cleared = G.cleared;
  const rs=document.getElementById('resultScreen');
  rs.className = cleared ? 'view ta-clear' : (isMem ? 'view mem' : 'view');
  const title=document.getElementById('resTitle');
  title.className = cleared ? 'res-title clear' : 'res-title';
  title.textContent = cleared ? 'CLEAR!' : 'GAME OVER';
  const badge=document.getElementById('resBadge');
  if (isMem) { badge.className='res-badge mem'; badge.textContent='💀 MEMORY MODE'; }
  else { badge.className='res-badge ta'; badge.textContent=`⏱ TIME ATTACK · ${G.target}자리`; }
  const scoreEl=document.getElementById('resScore');
  scoreEl.className = isMem ? 'res-score mem' : 'res-score';
  scoreEl.style.fontSize = isMem ? '' : '36px';
  const labelEl=document.getElementById('resLabel');
  if (isMem) { scoreEl.textContent = G.pos; labelEl.textContent = 'DIGITS CORRECT'; }
  else { scoreEl.style.fontSize = '36px'; scoreEl.textContent = fmtT(G.elapsed); labelEl.textContent = cleared ? `${G.target}자리 달성!` : `${G.pos} / ${G.target}자리`; }
  const rb=document.getElementById('retryBtn');
  rb.className = isMem ? 'btn-res pri mem' : 'btn-res pri';
  rb.textContent = isMem ? '💀 RETRY' : 'RETRY';
  let html='';
  if (!isMem) {
    html+=`<div class="stat-row"><span class="slbl">TIME</span><span class="sval">${fmtT(G.elapsed)}</span></div>`;
    html+=`<div class="stat-row"><span class="slbl">DIGITS</span><span class="sval">${G.pos} / ${G.target}</span></div>`;
  } else {
    html+=`<div class="stat-row"><span class="slbl">TOTAL TIME</span><span class="sval">${fmtT(G.elapsed)}</span></div>`;
    html+=`<div class="stat-row"><span class="slbl">LAPS DONE</span><span class="sval">${G.laps.length}</span></div>`;
  }
  if (G.laps.length>0) {
    const best=Math.min(...G.laps),worst=Math.max(...G.laps);
    html+=`<div class="stat-row"><span class="slbl">BEST LAP</span><span class="sval" style="color:var(--accent)">${fmtLap(best)}</span></div>`;
    html+=`<div class="stat-row"><span class="slbl">WORST LAP</span><span class="sval">${fmtLap(worst)}</span></div>`;
  }
  document.getElementById('resStats').innerHTML=html;
  const label = isMem ? 'RECORD YOUR NAME' : (G.cleared ? `🏆 ${G.target}자리 클리어!` : 'RECORD YOUR NAME');
  document.getElementById('resInputLabel').textContent = label;
  document.getElementById('nameInput').value = lastNickname;
  pending = { mode:G.mode, target:G.target, digits:G.pos, ms:G.elapsed, cleared:G.cleared };
  showView('resultScreen');
}

function submit(save) {
  if(!pending) return;
  const rawName = document.getElementById('nameInput').value.trim().toUpperCase();
  const name = save ? (rawName || lastNickname) : null;
  if(name) {
    lastNickname = name;
    const isMem = pending.mode==='mem';
    if(isMem) { if(pending.digits > 0) addScoreMem(name, pending.digits, pending.ms); }
    else { if(pending.cleared) addScoreTA(pending.target, name, pending.ms); }
  }
  const t=pending.target, m=pending.mode;
  pending=null;
  lbTab=m; lbSubtab= m==='ta'?t:lbSubtab;
  switchTab(m);
  if(m==='ta') switchSubtab(t);
  showLb();
}

// =====================================================
// UTILS
// =====================================================
function fmtT(ms) {
  if (ms==null||isNaN(ms)) return '--:--.-';
  const m=Math.floor(ms/60000),s=Math.floor((ms%60000)/1000),d=Math.floor((ms%1000)/100);
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}.${d}`;
}
function fmtLap(ms) { const s=Math.floor(ms/1000),d=Math.floor((ms%1000)/100); return `${s}.${d}s`; }

// =====================================================
// EASTER EGG
// =====================================================
let eggCount = 0, eggTimer = null, eggActive = false;
function easterEgg() {
  if (eggActive) return;
  eggCount++;
  clearTimeout(eggTimer);
  eggTimer = setTimeout(() => { eggCount = 0; }, 3000);
  if (eggCount >= 10) {
    eggCount = 0; eggActive = true;
    const el = document.getElementById('piSymbol');
    el.classList.add('rainbow');
    setTimeout(() => {
      el.classList.remove('rainbow');
      showCreditScroll();
    }, 3000);
  }
}

let creditOverlay = null;

function dismissCredit() {
  if (!creditOverlay) return;
  creditOverlay.classList.add('fade-out');
  setTimeout(() => { creditOverlay && creditOverlay.remove(); creditOverlay = null; eggActive = false; }, 400);
}

function showCreditScroll() {
  const lines = ['개발자', '최건우', '최광이'];
  creditOverlay = document.createElement('div');
  creditOverlay.className = 'credit-overlay';
  const els = lines.map(txt => {
    const el = document.createElement('div');
    el.className = 'credit-line';
    el.textContent = txt;
    creditOverlay.appendChild(el);
    return el;
  });
  document.body.appendChild(creditOverlay);
  // 순서대로 rise, 총 2초 후 fade out
  els.forEach((el, i) => { setTimeout(() => { el.classList.add('rise'); }, i * 200); });
  setTimeout(() => { dismissCredit(); }, 2000);
}

// =====================================================
// KEYBOARD
// =====================================================
document.addEventListener('keydown',function(e){
  const rs = document.getElementById('resultScreen');
  if(rs.classList.contains('active')){ if(e.key==='Enter') submit(true); return; }
  if(e.key>='0'&&e.key<='9') pk(parseInt(e.key),null,null);
});

document.querySelectorAll('.key').forEach(function(k){
  k.addEventListener('touchstart',function(e){e.preventDefault();},{passive:false});
});

// =====================================================
// INIT
// =====================================================
initFirebase();
</script>
